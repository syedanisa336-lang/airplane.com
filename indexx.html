<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyHigh Airways | Book Your Flight</title>
    <style>
        /* CSS Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
        }

        header {
            background-color: #003580;
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1436491865332-7a61a109c0f3?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        /* Booking Form */
        .booking-container {
            background: white;
            width: 80%;
            margin: -50px auto 50px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .booking-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        .input-group input, .input-group select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .btn-search {
            background-color: #ff671f;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 23px;
        }

        .btn-search:hover {
            background-color: #e55a1a;
        }

        /* Message Box */
        #message {
            margin-top: 20px;
            padding: 15px;
            display: none;
            border-radius: 4px;
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #003580;
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">✈ SkyHigh Airways</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Manage Booking</a>
            <a href="#">Check-in</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Duniya ki Sair Karen</h1>
        <p>Sasty flights aur behtreen service ke sath</p>
    </section>

    <div class="booking-container">
        <form class="booking-form" id="flightForm">
            <div class="input-group">
                <label>Kahan Sy? (From)</label>
                <input type="text" id="from" placeholder="City or Airport" required>
            </div>
            <div class="input-group">
                <label>Kahan Tak? (To)</label>
                <input type="text" id="to" placeholder="City or Airport" required>
            </div>
            <div class="input-group">
                <label>Date</label>
                <input type="date" id="date" required>
            </div>
            <div class="input-group">
                <label>Class</label>
                <select id="class">
                    <option value="economy">Economy</option>
                    <option value="business">Business</option>
                    <option value="first">First Class</option>
                </select>
            </div>
            <button type="submit" class="btn-search">Search Flights</button>
        </form>
        <div id="message"></div>
    </div>

    <footer>
        <p>&copy; 2026 SkyHigh Airways. All rights reserved.</p>
    </footer>

    <script>
        // JavaScript Logic
        document.getElementById('flightForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Page refresh hony sy rokta hy

            // Input values lena
            const from = document.getElementById('from').value;
            const to = document.getElementById('to').value;
            const date = document.getElementById('date').value;
            const flightClass = document.getElementById('class').value;

            // Simple validation aur result dikhana
            const messageDiv = document.getElementById('message');
            messageDiv.style.display = 'block';
            messageDiv.style.backgroundColor = '#d4edda';
            messageDiv.style.color = '#155724';
            
            messageDiv.innerHTML = `<strong>Shukriya!</strong> Hum ${from} sy ${to} tak ${date} ki flights search kr rhy hain (${flightClass} class mn).`;
            
            console.log("Searching for:", { from, to, date, flightClass });
        });
    </script>

</body>
</html>
